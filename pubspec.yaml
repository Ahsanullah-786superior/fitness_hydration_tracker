name: fitness_hydration_tracker
description: Advanced Fitness & Hydration Tracker with local storage and water reminders.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Local storage
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # State management
  provider: ^6.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.4
  permission_handler: ^11.3.1

  # Charts / stats
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
